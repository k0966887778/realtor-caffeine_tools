<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>預先請假系統</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>🗓️ 預先請假單</h1>
            <p id="profileBox">載入個人資料中...</p>
        </header>

        <main>
            <div class="calc-form">
                <form id="leaveForm">
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="startDate">請假開始日期</label>
                            <input type="date" id="startDate" required>
                        </div>
                        <div class="input-group">
                            <label for="endDate">請假結束日期</label>
                            <input type="date" id="endDate" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="leaveType">假別</label>
                        <select id="leaveType">
                            <option value="事假">事假</option>
                            <option value="病假">病假</option>
                            <option value="公假">公假</option>
                            <option value="特休">特休</option>
                            <option value="外出帶看">外出帶看</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="reason">請假事由</label>
                        <textarea id="reason" rows="3" placeholder="請簡述請假事由..." required></textarea>
                    </div>

                    <div class="input-group">
                        <label for="agentName">職務代理人 <i>(選填)</i></label>
                        <input type="text" id="agentName" placeholder="填寫姓名">
                    </div>

                    <button type="submit" class="primary-btn" id="submitBtn">送出申請</button>
                </form>
            </div>
        </main>
    </div>

    <!-- 引入 LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="app.js"></script>
</body>
</html>
