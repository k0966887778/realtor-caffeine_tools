<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>出勤日曆系統</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- 引入 FullCalendar CDN -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.10/locales-all.global.min.js"></script>
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <h1>🗓️ 出勤日曆系統</h1>
            <p id="loadingStatus">資料載入中，請稍候...</p>
        </header>

        <main>
            <div class="calendar-wrapper">
                <div id="calendar"></div>
            </div>
        </main>
    </div>

    <!-- 詳情彈窗 (Modal) -->
    <div id="detailModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 id="modalTitle">紀錄詳情</h3>
            <div id="modalBody" class="modal-body"></div>
            <button class="primary-btn mt-3" onclick="closeModal()">關閉</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
