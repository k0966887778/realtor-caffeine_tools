<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>房仲咖啡因丨值班紀錄</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <!-- 引入 LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1>☕️房仲咖啡因</h1>
            <p>值班紀錄</p>
        </header>

        <!-- Weekly Calendar Area -->
        <div class="calendar-card card">
            <div class="calendar-header">
                <button id="prevWeekBtn" class="nav-btn">&lt;</button>
                <h2 class="section-title month-title" id="monthDisplay">本週曆</h2>
                <button id="nextWeekBtn" class="nav-btn">&gt;</button>
            </div>
            <div id="weekCalendar" class="week-calendar">
                <!-- Javascript will generate days here -->
            </div>
            <button id="addDutyBtn" class="primary-btn" style="margin-top: 15px; display: none;">新增/檢視 該日值班紀錄</button>
        </div>

        <!-- Duty Record Container (Hidden by default) -->
        <div id="dutyRecordContainer" class="duty-container" style="display: none;">
            
            <!-- Area 1: 簽到交接 -->
            <div class="card duty-section">
                <h3 class="section-title">簽到交接</h3>
                <div class="input-group">
                    <label for="shiftType">班別</label>
                    <select id="shiftType" name="shiftType">
                        <option value="">請選擇</option>
                        <option value="早班">早班</option>
                        <option value="中班">中班</option>
                        <option value="晚班">晚班</option>
                    </select>
                </div>
                <div class="input-group">
                    <button id="signInBtn" class="secondary-btn">簽到</button>
                    <p id="signInStatus" class="status-text"></p>
                </div>
                <div class="input-group">
                    <label for="handoverNotes">交接事項</label>
                    <textarea id="handoverNotes" rows="4" placeholder="請填寫交接事項..."></textarea>
                </div>
            </div>

            <!-- Area 2: 客戶登記 -->
            <div class="card duty-section">
                <div class="section-header-flex">
                    <h3 class="section-title">客戶登記</h3>
                    <div class="pagination-tabs" id="customerTabs">
                        <button class="tab-btn add-btn" id="addCustomerBtn">+</button>
                    </div>
                </div>
                <!-- Dynamic Content Container -->
                <div id="customerFormsContainer">
                    <!-- Javascript generates forms here -->
                </div>
            </div>

            <!-- Area 3: 預約交辦事宜 -->
            <div class="card duty-section">
                <h3 class="section-title">預約交辦事宜</h3>
                <div class="input-group">
                    <textarea id="arrangedTasks" rows="4" placeholder="例如:友店下午1:30會來店借1988萬邊間雙車的鑰匙；友店下午1:30會來店借編號6的鑰匙；早上10點有廠商進來修冷氣等內容" class="placeholder-style"></textarea>
                </div>
            </div>

            <!-- Area 4: 友店借鑰匙控管 -->
            <div class="card duty-section">
                <div class="section-header-flex">
                    <h3 class="section-title">友店借鑰匙控管</h3>
                    <div class="pagination-tabs" id="keyTabs">
                        <button class="tab-btn add-btn" id="addKeyBtn">+</button>
                    </div>
                </div>
                <!-- Dynamic Content Container -->
                <div id="keyFormsContainer">
                    <!-- Javascript generates forms here -->
                </div>
            </div>

            <!-- Global Save Button -->
            <button id="saveAllBtn" class="primary-btn" style="margin-top: 20px; margin-bottom: 20px; background-color: var(--primary-dark);">💾 儲存所有值班與交接紀錄</button>

        </div>

        <div id="statusMsg" class="status-msg hidden"></div>

        <footer class="app-footer">
            <p id="profileBox">正在載入使用者資料...</p>
        </footer>
    </div>

    <!-- Templates for Dynamic Forms -->
    <template id="customerFormTemplate">
        <div class="dynamic-form-page">
            <div class="form-row">
                <div class="input-group half">
                    <label>登記日期</label>
                    <input type="text" class="reg-date" readonly>
                </div>
                <div class="input-group half">
                    <label>登記人</label>
                    <input type="text" class="registrant" placeholder="值班者">
                </div>
            </div>
            <div class="form-row">
                <div class="input-group half">
                    <label>來源</label>
                    <select class="source-select">
                        <option value="">請選擇</option>
                        <option value="電話">電話</option>
                        <option value="來店">來店</option>
                        <option value="LINE">LINE</option>
                        <option value="網路">網路</option>
                        <option value="介紹">介紹</option>
                        <option value="其他">其他</option>
                    </select>
                    <input type="text" class="source-other hidden" placeholder="請輸入來源" style="margin-top: 5px;">
                </div>
                <div class="input-group half">
                    <label>聯絡電話</label>
                    <input type="tel" class="contact-phone" placeholder="填寫電話">
                </div>
            </div>
            <div class="form-row">
                <div class="input-group half">
                    <label>詢問物件</label>
                    <input type="text" class="inquiry-prop" placeholder="無則免填">
                </div>
                <div class="input-group half">
                    <label>客戶需求</label>
                    <select class="customer-need">
                        <option value="">請選擇</option>
                        <option value="預算">預算</option>
                        <option value="區域">區域</option>
                        <option value="房型">房型</option>
                    </select>
                </div>
            </div>
            <!-- Status Full Row -->
            <div class="input-group full">
                <label>狀態</label>
                <select class="status-select">
                    <option value="">請選擇</option>
                    <option value="待追蹤">待追蹤</option>
                    <option value="已聯繫">已聯繫</option>
                    <option value="已約看">已約看</option>
                    <option value="已帶看">已帶看</option>
                    <option value="持續洽談">持續洽談</option>
                    <option value="已成交">已成交</option>
                    <option value="無效">無效</option>
                </select>
            </div>
            <!-- Remarks Full Row -->
            <div class="input-group full">
                <label>備註</label>
                <textarea class="remarks" rows="2" placeholder="備註說明"></textarea>
            </div>
        </div>
    </template>

    <template id="keyFormTemplate">
        <div class="dynamic-form-page">
            <div class="form-row">
                <div class="input-group half">
                    <label>登記時間</label>
                    <input type="text" class="key-reg-time" readonly>
                </div>
                <div class="input-group half">
                    <label>借用人姓名</label>
                    <input type="text" class="borrower-name" placeholder="請填寫姓名">
                    <small style="color: #999; font-size: 12px; display: block; margin-top: 4px;">提醒：請將名片拍照上傳至LINE官方</small>
                </div>
            </div>
            <div class="form-row">
                <div class="input-group half">
                    <label>物件名</label>
                    <input type="text" class="prop-name" placeholder="填寫物件">
                </div>
                <div class="input-group half">
                    <label>鑰匙編號</label>
                    <input type="text" class="key-number" placeholder="選填">
                </div>
            </div>
            <div class="form-row">
                <div class="input-group half">
                    <label>借出時間</label>
                    <input type="time" class="borrow-time">
                </div>
                <div class="input-group half">
                    <label>歸還時間</label>
                    <input type="time" class="return-time">
                </div>
            </div>
            <div class="form-row">
                <div class="input-group half">
                    <label>經手人</label>
                    <input type="text" class="handler-name" placeholder="值班者">
                </div>
                <div class="input-group half">
                    <label>歸還確認人</label>
                    <input type="text" class="confirmer-name" placeholder="歸還確認">
                </div>
            </div>
        </div>
    </template>

    <script src="app.js"></script>
</body>

</html>
