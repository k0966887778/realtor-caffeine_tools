<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>房仲咖啡因｜輪值表管理系統</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <h1>輪值表管理系統</h1>
            <p>點選可查看或刪除<br>點選下方按鈕新增班表</p>
        </header>

        <div class="calendar-card">
            <div id="calendar"></div>

            <button id="toggleEditBtn" class="primary-btn" style="margin-top: 20px; background-color: #5C6BC0;">
                編輯模式
            </button>
        </div>

        <div class="calc-form" id="editFormContainer" style="display: none;">
            <form id="dutyForm">
                <div class="input-group">
                    <label for="shiftType">班別</label>
                    <select id="shiftType" name="shiftType" required>
                        <option value="">請選擇</option>
                        <option value="早班">早班</option>
                        <option value="中班">中班</option>
                        <option value="晚班">晚班</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="dutyName">值班者</label>
                    <input type="text" id="dutyName" name="dutyName" list="staffList" placeholder="請輸入值班者姓名" required>
                    <datalist id="staffList"></datalist>
                </div>

                <div class="input-group">
                    <label for="editorName">3. 編輯者</label>
                    <input type="text" id="editorName" name="editorName" list="editorList" placeholder="請輸入您的姓名" required>
                    <datalist id="editorList"></datalist>
                </div>

                <div class="selected-info">
                    已選擇：
                    <div id="selectedDateList" class="date-tags"></div>
                </div>
                <button type="submit" id="submitBtn" class="primary-btn" disabled>儲存排班資料</button>
            </form>
        </div>

        <div id="statusMsg" class="status-msg hidden"></div>

        <footer class="app-footer">
            <p id="profileBox">正在載入使用者資料...</p>
        </footer>
    </div>

    <!-- 事件詳情 Modal -->
    <div id="detailModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h3 id="modalTitle">排班詳情</h3>
            <div id="modalBody" class="modal-body"></div>
            <div class="modal-actions">
                <button id="deleteBtn" class="delete-btn">刪除</button>
                <button onclick="closeModal()" class="close-btn">關閉</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
